function sec(t,tag){
  var marker='==='+tag+'===';
  var idx=t.indexOf(marker);
  if(idx<0)return'';
  var start=idx+marker.length;
  while(start<t.length&&(t[start]===' '||t[start]==='\t'))start++;
  if(t[start]==='\r')start++;
  if(t[start]==='\n')start++;
  var nextIdx=t.indexOf('\n===',start);
  var content=nextIdx<0?t.slice(start):t.slice(start,nextIdx);
  return content.trim();
}

  var NEG=['ÌÓƒ','ÕÓƒ','Ó¨Ì','ÕÇÌ','Í¯Óˋ¤','Í¯Í¨'];
  var brMap={};chart.palaces.forEach(function(p){brMap[p.branch]=p;});

  chart.palaces.forEach(function(p){var pos=POS[p.branch];if(pos)cells[pos[0]][pos[1]]=p;});
  var h='';
  for(var row=0;row<4;row++){

          h+='<span style="color:var(--cream3)">Õ§Ìÿ¥</span>'+sd+' '+gLabel+'<br>';

      var isLife=p.isLifePalace,isBodyPal=p.isBodyPalace&&!p.isLifePalace;
      var sanfang=sfBranches.indexOf(p.branch)>-1;
      var cls='mp-cell'+(isLife?' life':(isBodyPal?' body':(sanfang?' sanfang':'')));

      if(p.ages&&p.ages.length)h+='<div class="mp-ages">Í¯Õ:'+p.ages.slice(0,7).join(' ')+'</div>';
      h+='<div class="mp-stars">';
      p.majorStars.forEach(function(s){h+=starTag(s)+' ';});

}
